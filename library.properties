name=LGFXVirtualCanvas
version=0.1.0
author=TANAKA Masayuki
maintainer=TANAKA Masayuki <ms.tanaka@freebit.net>
sentence=Virtual full-screen canvas over LovyanGFX / M5GFX via vertical tiling.
paragraph=Draw to a virtual full-screen canvas even when a full double-buffer does not fit in RAM. The screen is split into vertical tiles rendered into a small reused sprite; your draw callback runs once per tile in virtual coordinates and the library hides the Y offset, clipping, and flush. Include your graphics library (LovyanGFX / M5GFX / M5Unified) before this header.
category=Display
url=https://github.com/tanakamasayuki/LGFXVirtualCanvas
architectures=*
includes=LGFXVirtualCanvas.h
